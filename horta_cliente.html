<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horta em Casa — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --verde-escuro: #2a5c3f;
  --verde-meio:   #3a7d56;
  --verde-claro:  #52a876;
  --verde-bg:     #eef6f1;
  --verde-suave:  #d4ead9;
  --laranja:      #e07b39;
  --laranja-l:    #fdf0e6;
  --marrom:       #4a2c1a;
  --creme:        #f8f5f0;
  --branco:       #ffffff;
  --cinza-texto:  #6b7280;
  --cinza-borda:  #e2e8e4;
  --escuro:       #1a2e22;
  --danger:       #dc2626;
  --r:            12px;
  --shadow-sm:    0 1px 4px rgba(42,92,63,.08);
  --shadow-md:    0 4px 20px rgba(42,92,63,.14);
  --shadow-lg:    0 10px 40px rgba(42,92,63,.20);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Montserrat', sans-serif;
  background: var(--creme);
  color: var(--escuro);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── TOPBAR ─────────────────────────────────────── */
.topbar {
  background: var(--verde-escuro);
  padding: 0 1.2rem;
  height: 74px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.22);
}

/* Logo SVG inline replicando identidade da marca */

.logo-img {
  height: 58px;
  width: auto;
  display: block;
  object-fit: contain;
  mix-blend-mode: normal;
}



/* ─── HERO ─────────────────────────────────────── */
.hero {
  background: linear-gradient(145deg, var(--verde-escuro) 0%, var(--verde-meio) 60%, #4a9668 100%);
  padding: 2.2rem 1.4rem 3.6rem;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
}
.hero-inner { position: relative; text-align: center; }
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  color: rgba(255,255,255,.9);
  font-size: .68rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: .28rem .8rem;
  border-radius: 50px;
  margin-bottom: .9rem;
}
.hero-badge span { width: 6px; height: 6px; background: #8cc63f; border-radius: 50%; display: inline-block; }
.hero h2 {
  font-size: 1.65rem;
  font-weight: 800;
  color: #fff;
  line-height: 1.2;
  margin-bottom: .5rem;
  letter-spacing: -.02em;
}
.hero p {
  color: rgba(255,255,255,.65);
  font-size: .8rem;
  font-weight: 400;
  max-width: 340px;
  margin: 0 auto;
  line-height: 1.6;
}

/* ─── SEARCH ─────────────────────────────────────── */
.search-wrap {
  max-width: 500px;
  margin: 0 auto;
  padding: 0 1.2rem;
  transform: translateY(-1.6rem);
}
.search-box {
  display: flex;
  align-items: center;
  background: var(--branco);
  border-radius: 50px;
  box-shadow: var(--shadow-lg);
  padding: 0 1.1rem;
  gap: .6rem;
}
.search-box svg { color: var(--cinza-texto); flex-shrink: 0; }
.search-inp {
  flex: 1;
  border: none;
  outline: none;
  font-family: 'Montserrat', sans-serif;
  font-size: .85rem;
  font-weight: 500;
  color: var(--escuro);
  padding: .9rem 0;
  background: transparent;
}
.search-inp::placeholder { color: #b0bcb5; font-weight: 400; }

/* ─── CATEGORIAS ─────────────────────────────────── */
.cat-strip {
  display: flex;
  overflow-x: auto;
  gap: .4rem;
  padding: .2rem 1.2rem .8rem;
  scrollbar-width: none;
  max-width: 960px;
  margin: 0 auto;
}
.cat-strip::-webkit-scrollbar { display: none; }
.ctab {
  flex-shrink: 0;
  padding: .4rem 1rem;
  border-radius: 50px;
  border: 1.5px solid var(--cinza-borda);
  background: var(--branco);
  font-family: 'Montserrat', sans-serif;
  font-size: .73rem;
  font-weight: 600;
  cursor: pointer;
  color: var(--cinza-texto);
  transition: all .2s;
  white-space: nowrap;
  letter-spacing: .01em;
  box-shadow: var(--shadow-sm);
}
.ctab.active {
  background: var(--verde-escuro);
  color: #fff;
  border-color: var(--verde-escuro);
  box-shadow: 0 2px 10px rgba(42,92,63,.25);
}

/* ─── GRID DE PRODUTOS ─────────────────────────── */
.cat-body {
  max-width: 960px;
  margin: 0 auto;
  padding: .4rem 1.2rem 8rem;
}
.sec-header {
  display: flex;
  align-items: center;
  gap: .6rem;
  margin: 1.4rem 0 .8rem;
}
.sec-title {
  font-size: .7rem;
  font-weight: 800;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--verde-escuro);
}
.sec-line { flex: 1; height: 1px; background: var(--cinza-borda); }
.sec-count {
  font-size: .65rem;
  font-weight: 700;
  background: var(--verde-bg);
  color: var(--verde-meio);
  padding: .1rem .5rem;
  border-radius: 50px;
  letter-spacing: .04em;
}

.prod-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: .7rem;
}

.prod-card {
  background: var(--branco);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  transition: transform .2s, box-shadow .2s;
  border: 1px solid var(--cinza-borda);
  position: relative;
  cursor: pointer;
}
.prod-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }

.prod-img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  display: block;
}
.prod-ph {
  width: 100%;
  aspect-ratio: 1/1;
  background: var(--verde-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.6rem;
}
.in-cart-badge {
  position: absolute;
  top: .5rem;
  right: .5rem;
  background: var(--laranja);
  color: #fff;
  border-radius: 50px;
  padding: .1rem .5rem;
  font-size: .6rem;
  font-weight: 700;
  letter-spacing: .02em;
}

.prod-info { padding: .7rem .75rem .75rem; }
.prod-nome {
  font-weight: 700;
  font-size: .78rem;
  line-height: 1.3;
  margin-bottom: .1rem;
  color: var(--escuro);
  letter-spacing: -.01em;
}
.prod-unit {
  color: var(--cinza-texto);
  font-size: .65rem;
  font-weight: 500;
  margin-bottom: .65rem;
}

.btn-add {
  width: 100%;
  background: var(--verde-escuro);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: .42rem 0;
  font-size: .72rem;
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .04em;
  text-transform: uppercase;
  transition: background .2s;
}
.btn-add:hover { background: var(--verde-meio); }

.card-qty-ctrl {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .3rem;
  width: 100%;
  background: var(--verde-bg);
  border-radius: 8px;
  padding: .22rem .3rem;
}
.cqbtn {
  background: var(--branco);
  border: 1.5px solid var(--cinza-borda);
  width: 26px;
  height: 26px;
  border-radius: 6px;
  font-size: .95rem;
  cursor: pointer;
  color: var(--verde-escuro);
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
  line-height: 1;
}
.cqbtn:hover { background: var(--verde-escuro); color: #fff; border-color: var(--verde-escuro); }
.card-qty-label {
  font-weight: 700;
  font-size: .72rem;
  color: var(--verde-escuro);
  text-align: center;
  flex: 1;
  white-space: nowrap;
  letter-spacing: .02em;
}

/* ─── FAB CARRINHO ─────────────────────────────── */
.fab {
  position: fixed;
  bottom: 1.4rem;
  right: 1.4rem;
  background: var(--verde-escuro);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: .85rem 1.4rem;
  font-size: .85rem;
  font-weight: 700;
  font-family: 'Montserrat', sans-serif;
  letter-spacing: .03em;
  cursor: pointer;
  z-index: 50;
  box-shadow: 0 6px 28px rgba(42,92,63,.4);
  display: flex;
  align-items: center;
  gap: .55rem;
  transition: transform .2s, box-shadow .2s;
}
.fab:hover { transform: scale(1.04); box-shadow: 0 10px 36px rgba(42,92,63,.5); }
.fab.hidden { display: none; }
.fbn {
  background: var(--laranja);
  border-radius: 50px;
  padding: .06rem .5rem;
  font-size: .72rem;
  min-width: 22px;
  text-align: center;
}

/* ─── OVERLAY / MODAL CARRINHO ──────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(2px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--creme);
  width: 100%;
  max-width: 540px;
  border-radius: 20px 20px 0 0;
  padding: 1.6rem 1.3rem 2.5rem;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp .3s cubic-bezier(.22,1,.36,1);
}
@keyframes slideUp { from { transform: translateY(100%) } to { transform: none } }

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--cinza-borda);
  border-radius: 50px;
  margin: 0 auto 1.3rem;
}
.mhead {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.2rem;
}
.mhead h3 {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--verde-escuro);
  letter-spacing: -.02em;
}
.mclose {
  background: var(--verde-bg);
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: .95rem;
  cursor: pointer;
  color: var(--verde-escuro);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s;
}
.mclose:hover { background: var(--verde-suave); }

.citem {
  display: flex;
  align-items: center;
  gap: .75rem;
  background: var(--branco);
  border-radius: 10px;
  padding: .7rem .9rem;
  margin-bottom: .4rem;
  border: 1px solid var(--cinza-borda);
}
.citem-em {
  width: 44px;
  height: 44px;
  border-radius: 8px;
  background: var(--verde-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  flex-shrink: 0;
  overflow: hidden;
}
.citem-em img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
.cinfo { flex: 1; }
.cinfo strong { display: block; font-size: .82rem; font-weight: 700; color: var(--escuro); }
.cinfo span { color: var(--cinza-texto); font-size: .7rem; font-weight: 500; }
.cctrl { display: flex; align-items: center; gap: .4rem; }
.cbtn {
  background: var(--verde-bg);
  border: none;
  width: 26px;
  height: 26px;
  border-radius: 6px;
  font-size: .9rem;
  cursor: pointer;
  color: var(--verde-escuro);
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
}
.cbtn:hover { background: var(--verde-escuro); color: #fff; }
.cqty { font-weight: 700; min-width: 26px; text-align: center; font-size: .78rem; color: var(--escuro); }

/* Formulário pedido */
.form-section {
  margin: 1.2rem 0;
  border-top: 1px solid var(--cinza-borda);
  padding-top: 1.1rem;
}
.form-section-title {
  font-size: .65rem;
  font-weight: 800;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--cinza-texto);
  margin-bottom: .8rem;
}
.fields { display: flex; flex-direction: column; gap: .55rem; }
.fields label {
  font-size: .7rem;
  font-weight: 700;
  color: var(--escuro);
  display: block;
  margin-bottom: .2rem;
  letter-spacing: .02em;
}
.fields input, .fields textarea {
  width: 100%;
  padding: .65rem .85rem;
  border: 1.5px solid var(--cinza-borda);
  border-radius: 10px;
  font-family: 'Montserrat', sans-serif;
  font-size: .82rem;
  font-weight: 500;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  background: var(--branco);
  color: var(--escuro);
}
.fields input:focus, .fields textarea:focus {
  border-color: var(--verde-meio);
  box-shadow: 0 0 0 3px rgba(42,92,63,.1);
}
.fields textarea { resize: none; }

.aviso-pesagem {
  display: flex;
  align-items: flex-start;
  gap: .6rem;
  background: var(--laranja-l);
  border: 1px solid rgba(224,123,57,.2);
  padding: .65rem .85rem;
  border-radius: 10px;
  margin: .8rem 0;
}
.aviso-pesagem svg { flex-shrink: 0; margin-top: 1px; color: var(--laranja); }
.aviso-pesagem p { font-size: .72rem; font-weight: 500; color: #7c4a1e; line-height: 1.5; }

.btn-wpp {
  width: 100%;
  background: #25D366;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: .9rem;
  font-size: .85rem;
  font-weight: 700;
  font-family: 'Montserrat', sans-serif;
  letter-spacing: .03em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  transition: background .2s, transform .15s;
  margin-top: .5rem;
}
.btn-wpp:hover { background: #1ebe5d; transform: translateY(-1px); }

/* ─── EMPTY STATE ───────────────────────────────── */
.empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--cinza-texto);
}
.empty-icon { font-size: 3rem; margin-bottom: .8rem; opacity: .6; }
.empty p { font-size: .85rem; font-weight: 500; }

/* ─── RESPONSIVO ─────────────────────────────────── */
@media (max-width: 400px) {
  .prod-grid { grid-template-columns: repeat(2, 1fr); }
  .hero h2 { font-size: 1.4rem; }
}
@media (min-width: 600px) {
  .prod-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
}

/* ─── SCROLL HINT ─────────────────────────────── */
.cat-strip-wrap {
  position: relative;
}
.scroll-hint {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 48px;
  background: linear-gradient(to right, transparent, var(--creme) 70%);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 6px;
  pointer-events: none;
  z-index: 10;
  transition: opacity .3s;
}
.scroll-hint svg {
  animation: nudge 1.4s ease-in-out infinite;
  color: var(--verde-meio);
  opacity: .85;
}
@keyframes nudge {
  0%, 100% { transform: translateX(0); }
  40%       { transform: translateX(5px); }
  70%       { transform: translateX(-2px); }
}
</style>
</head>

// Permite que o painel admin adicione produtos via localStorage
try {
  const extra = JSON.parse(localStorage.getItem('hc_prods_extra') || '[]');
  if (extra.length) prods = [...prods, ...extra];
} catch(e){}

let carrinho = [];
let catCli = 'Todos';
let buscaAtual = '';

// ══ CATÁLOGO ══
function renderCatalogo() { renderTabsCat(); renderProdsCat(); }

function renderTabsCat() {
  document.getElementById('cat-tabs').innerHTML =
    ['Todos', ...Object.keys(CATS)].map(c =>
      `<button class="ctab ${c===catCli?'active':''}" onclick="setCatCli('${c}')">
        ${c==='Todos' ? '🌿 Todos' : CATS[c]+' '+c}
      </button>`
    ).join('');
}

function setCatCli(c) { catCli = c; renderTabsCat(); renderProdsCat(); }
function buscar(v) { buscaAtual = v; renderProdsCat(); }

function renderProdsCat() {
  const cats = catCli === 'Todos' ? Object.keys(CATS) : [catCli];
  let html = '';
  cats.forEach(cat => {
    const lista = prods.filter(p =>
      p.c === cat && p.ativo && p.n.toLowerCase().includes(buscaAtual.toLowerCase())
    );
    if (!lista.length) return;
    html += `
      <div class="sec-header">
        <span class="sec-title">${CATS[cat]} ${cat}</span>
        <span class="sec-line"></span>
        <span class="sec-count">${lista.length}</span>
      </div>
      <div class="prod-grid">`;
    lista.forEach(p => {
      const it = carrinho.find(x => x.id === p.id);
      const kg = isKgProd(p);
      const badge = it
        ? `<div class="in-cart-badge">${kg ? fmtGrama(it.gramas||100) : it.qty+'×'}</div>`
        : '';
      const unitLabel = kg
        ? (p.u==='kg' ? 'por kg • selecione em gramas' : 'por grama')
        : 'por ' + p.u;
      let botao = '';
      if (!it) {
        botao = `<button class="btn-add" onclick="cardMais('${p.id}',event)">+ Adicionar</button>`;
      } else {
        const lbl = kg ? fmtGrama(it.gramas||100) : it.qty+'×';
        botao = `<div class="card-qty-ctrl">
          <button class="cqbtn" onclick="cardMenos('${p.id}',event)">−</button>
          <span class="card-qty-label">${lbl}</span>
          <button class="cqbtn" onclick="cardMais('${p.id}',event)">+</button>
        </div>`;
      }
      html += `<div class="prod-card">
        ${badge}
        ${p.foto ? `<img class="prod-img" src="${p.foto}" alt="${p.n}">` : `<div class="prod-ph">${p.emoji}</div>`}
        <div class="prod-info">
          <div class="prod-nome">${cap(p.n)}</div>
          <div class="prod-unit">${unitLabel}</div>
          ${botao}
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  if (!html) html = `<div class="empty"><div class="empty-icon">🔍</div><p>Nenhum produto encontrado.</p></div>`;
  document.getElementById('cat-body').innerHTML = html;
}

// ══ CARRINHO ══
function cardMais(id, ev) {
  ev.stopPropagation();
  const p = prods.find(x => x.id === id);
  const it = carrinho.find(x => x.id === id);
  if (isKgProd(p)) {
    if (!it) { carrinho.push({...p, qty:1, gramas:100}); }
    else { const idx = GRAMAS_STEPS.indexOf(it.gramas||100); if (idx < GRAMAS_STEPS.length-1) it.gramas = GRAMAS_STEPS[idx+1]; }
  } else {
    if (!it) carrinho.push({...p, qty:1});
    else it.qty++;
  }
  atuFab(); renderProdsCat();
}

function cardMenos(id, ev) {
  ev.stopPropagation();
  const p = prods.find(x => x.id === id);
  const it = carrinho.find(x => x.id === id);
  if (!it) return;
  if (isKgProd(p)) {
    const idx = GRAMAS_STEPS.indexOf(it.gramas||100);
    if (idx <= 0) carrinho = carrinho.filter(x => x.id !== id);
    else it.gramas = GRAMAS_STEPS[idx-1];
  } else {
    it.qty--;
    if (it.qty <= 0) carrinho = carrinho.filter(x => x.id !== id);
  }
  atuFab(); renderProdsCat();
}

function atuFab() {
  const n = carrinho.length;
  document.getElementById('fbn').textContent = n;
  document.getElementById('fab').classList.toggle('hidden', n===0);
}

function abrirCarrinho() {
  document.getElementById('ov-carrinho').classList.add('open');
  renderModalCarrinho();
}
function fecharCarrinho() { document.getElementById('ov-carrinho').classList.remove('open'); }

function renderModalCarrinho() {
  const div = document.getElementById('m-itens');
  if (!carrinho.length) {
    div.innerHTML = `<div class="empty"><div class="empty-icon">🛒</div><p>Carrinho vazio</p></div>`;
    return;
  }
  div.innerHTML = carrinho.map(i => {
    const kg = isKgProd(i);
    const lbl = kg ? fmtGrama(i.gramas||100) : i.qty+'×';
    const sub = kg ? fmtGrama(i.gramas||100)+' de '+cap(i.n) : i.qty+'× '+cap(i.n);
    return `<div class="citem">
      <div class="citem-em">${i.foto ? `<img src="${i.foto}" alt="${i.n}">` : i.emoji}</div>
      <div class="cinfo"><strong>${cap(i.n)}</strong><span>${sub}</span></div>
      <div class="cctrl">
        <button class="cbtn" onclick="ajustarModal('${i.id}',-1)">−</button>
        <span class="cqty">${lbl}</span>
        <button class="cbtn" onclick="ajustarModal('${i.id}',1)">+</button>
      </div>
    </div>`;
  }).join('');
}

function ajustarModal(id, d) {
  const ev = { stopPropagation: ()=>{} };
  if (d > 0) cardMais(id, ev); else cardMenos(id, ev);
  renderModalCarrinho();
}

function itemStr(i) {
  const kg = isKgProd(i);
  return kg ? `${fmtGrama(i.gramas||100)} de ${cap(i.n)}` : `${i.qty}× ${cap(i.n)}`;
}

function enviarPedido() {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { alert('Por favor, informe seu nome.'); return; }
  if (!carrinho.length) { alert('Seu carrinho está vazio.'); return; }
  const end  = document.getElementById('f-end').value.trim();
  const tel  = document.getElementById('f-tel').value.trim();
  const obs  = document.getElementById('f-obs').value.trim();

  let msg = `🌿 *HORTA EM CASA — Novo Pedido*\n\n👤 *Cliente:* ${nome}\n`;
  if (end) msg += `📍 *Endereço:* ${end}\n`;
  if (tel) msg += `📱 *WhatsApp:* ${tel}\n`;
  msg += `\n🛒 *Itens:*\n`;
  carrinho.forEach(i => msg += `• ${itemStr(i)}\n`);
  msg += `\n⚖️ _Valor calculado após pesagem e confirmado antes da entrega._`;
  if (obs) msg += `\n\n📝 *Obs:* ${obs}`;

  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
  carrinho = [];
  ['f-nome','f-end','f-tel'].forEach(x => document.getElementById(x).value='');
  document.getElementById('f-obs').value = '';
  fecharCarrinho(); atuFab(); renderProdsCat();
}

(function() {
  const strip = document.getElementById('cat-tabs');
  const hint  = document.getElementById('scroll-hint');
  if (!strip || !hint) return;
  function check() {
    const atEnd = strip.scrollLeft + strip.clientWidth >= strip.scrollWidth - 8;
    hint.style.opacity = atEnd ? '0' : '1';
  }
  strip.addEventListener('scroll', check, { passive: true });
  // checar depois do render
  setTimeout(check, 300);
})();
